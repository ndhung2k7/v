<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook Reels AutoBot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 Reels AutoBot</h1>
    </div>

    <div class="status-section">
      <div class="status-indicator" id="statusIndicator"></div>
      <span id="statusText">Đã tắt</span>
    </div>

    <button class="toggle-btn" id="toggleBtn">▶ Bật</button>

    <div class="shortcut-info">
      ⌨️ Alt + Q
    </div>

    <div class="comments-section">
      <h3>💬 Comment</h3>
      
      <div class="form-group">
        <input 
          type="text" 
          id="commentInput" 
          placeholder="Thêm comment..."
          maxlength="150"
        >
        <button id="addBtn" class="add-btn">+</button>
      </div>

      <div id="commentsList" class="comments-list">
        <p class="empty-message">Trống</p>
      </div>
    </div>

    <div class="footer">
      v1.0 | Alt+Q
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
